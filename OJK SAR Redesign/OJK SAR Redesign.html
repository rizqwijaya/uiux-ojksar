<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OJK SAR — Redesign</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body { font-family: var(--font-family); background: var(--neutral-100); color: var(--neutral-900); -webkit-font-smoothing: antialiased; }
  button { font-family: var(--font-family); }
  input, textarea, select { font-family: var(--font-family); }
  a { color: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--neutral-300); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes ojkBlink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.25; transform: scale(0.85); } }
  @keyframes ojkPulseRing { 0% { transform: scale(0.8); opacity: 0.7; } 100% { transform: scale(2.4); opacity: 0; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="page-login.jsx"></script>
<script type="text/babel" src="page-beranda.jsx"></script>
<script type="text/babel" src="page-pengumuman.jsx"></script>
<script type="text/babel" src="page-kontak.jsx"></script>
<script type="text/babel" src="page-laporan.jsx"></script>
<script type="text/babel" src="page-pinjaman.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="i18n.jsx"></script>

<script type="text/babel">
const __mountRouter = () => {
  if (window.Router && window.PageLogin && window.PageBeranda && window.PagePengumuman && window.PageKontak && window.PageLaporan && window.PagePinjaman) {
    ReactDOM.createRoot(document.getElementById('root')).render(<Router />);
  } else {
    setTimeout(__mountRouter, 30);
  }
};
__mountRouter();
</script>
</body>
</html>
