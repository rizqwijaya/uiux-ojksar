<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-family); background: #fff; padding: 20px 24px; display: flex; gap: 20px; }
  .field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  label { font-size: 13px; font-weight: 600; color: var(--neutral-700); }
  input, select { font-family: var(--font-family); font-size: 14px; padding: 10px 12px; border: 1.5px solid var(--neutral-300); border-radius: var(--radius-md); outline: none; color: var(--neutral-900); background: #fff; }
  input:focus, select:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px var(--primary-100); }
  .error input { border-color: var(--color-error); }
  .error .msg { font-size: 12px; color: var(--color-error); }
  .hint { font-size: 11px; color: var(--neutral-500); }
</style>
</head><body>
  <div class="field">
    <label>Nama Lengkap</label>
    <input type="text" placeholder="Masukkan nama" value="Ahmad Fauzi">
    <span class="hint">Sesuai KTP</span>
  </div>
  <div class="field">
    <label>Jenis Layanan</label>
    <select><option>Perbankan</option><option>Pasar Modal</option></select>
  </div>
  <div class="field error">
    <label>Email</label>
    <input type="email" value="invalid@">
    <span class="msg">Format email tidak valid</span>
  </div>
</body></html>
