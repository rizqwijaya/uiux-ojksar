<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-family); background: #fff; padding: 24px 28px; display: flex; align-items: center; gap: 32px; }
  .logo-light { background: #fff; padding: 16px 24px; border: 1px solid var(--neutral-200); border-radius: var(--radius-md); }
  .logo-dark { background: var(--neutral-900); padding: 16px 24px; border-radius: var(--radius-md); }
  img { height: 56px; display: block; }
  .caption { font-size: 11px; color: var(--neutral-500); margin-top: 6px; text-align: center; }
</style>
</head><body>
  <div>
    <div class="logo-light"><img src="../assets/OJK_Logo.png" alt="OJK Logo"></div>
    <div class="caption">On light</div>
  </div>
  <div>
    <div class="logo-dark"><img src="../assets/OJK_Logo.png" alt="OJK Logo" style="filter: brightness(1.2)"></div>
    <div class="caption">On dark</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:4px;">
    <div style="font-size:13px;color:var(--neutral-600)">File: <code>assets/OJK_Logo.png</code></div>
    <div style="font-size:12px;color:var(--neutral-500)">Use on white or light backgrounds. For dark backgrounds, consider requesting an inverted version.</div>
  </div>
</body></html>
