<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJK SAR — Redesign</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body { font-family: var(--font-family); background: var(--neutral-100); color: var(--neutral-900); -webkit-font-smoothing: antialiased; }
  button { font-family: var(--font-family); }
  input, textarea, select { font-family: var(--font-family); }
  a { color: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--neutral-300); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes ojkBlink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.25; transform: scale(0.85); } }
  @keyframes ojkPulseRing { 0% { transform: scale(0.8); opacity: 0.7; } 100% { transform: scale(2.4); opacity: 0; } }

  /* Login responsive */
  .ojk-login-body { display: grid; grid-template-columns: 1.25fr 1fr; flex: 1; min-height: 0; position: relative; }
  .ojk-login-hero { display: flex; flex-direction: column; }
  .ojk-login-panel { display: flex; align-items: center; justify-content: center; padding: 48px 44px; background: #fff; position: relative; overflow: hidden; }
  .ojk-login-brand { height: 56px; background: transparent; position: absolute; top: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center; padding: 0 32px; color: #fff; }

  @media (max-width: 768px) {
    .ojk-login-body { grid-template-columns: 1fr; }
    .ojk-login-hero { display: none; }
    .ojk-login-panel { padding: 32px 24px; align-items: flex-start; padding-top: 80px; }
    .ojk-login-brand { padding: 0 20px; background: var(--color-primary); }
    .ojk-login-brand-text-title { font-size: 13px !important; }
    .ojk-login-brand-text-sub { font-size: 9.5px !important; }
  }

  @media (max-width: 400px) {
    .ojk-login-panel { padding: 20px 16px; padding-top: 72px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="page-login.jsx"></script>
<script type="text/babel" src="page-beranda.jsx"></script>
<script type="text/babel" src="page-pengumuman.jsx"></script>
<script type="text/babel" src="page-kontak.jsx"></script>
<script type="text/babel" src="page-laporan.jsx"></script>
<script type="text/babel" src="page-pinjaman.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="i18n.jsx"></script>

<script type="text/babel">
const __mountRouter = () => {
  if (window.Router && window.PageLogin && window.PageBeranda && window.PagePengumuman && window.PageKontak && window.PageLaporan && window.PagePinjaman) {
    ReactDOM.createRoot(document.getElementById('root')).render(<Router />);
  } else {
    setTimeout(__mountRouter, 30);
  }
};
__mountRouter();
</script>
</body>
</html>
