<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-family); background: #fff; padding: 20px 28px; }
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 6px; }
  .tag { font-size: 11px; color: var(--neutral-500); width: 32px; flex-shrink: 0; text-align: right; }
  .meta { font-size: 11px; color: var(--neutral-400); margin-left: auto; white-space: nowrap; }
  h1,h2,h3,h4,h5,h6 { color: var(--neutral-900); letter-spacing: var(--ls-heading); }
</style>
</head><body>
  <div class="row"><span class="tag">H1</span><h1 style="font-size:var(--text-h1);font-weight:var(--weight-bold);line-height:var(--lh-tight)">Heading One</h1><span class="meta">36px · Bold · 120%</span></div>
  <div class="row"><span class="tag">H2</span><h2 style="font-size:var(--text-h2);font-weight:var(--weight-semibold);line-height:var(--lh-tight)">Heading Two</h2><span class="meta">30px · Semibold · 120%</span></div>
  <div class="row"><span class="tag">H3</span><h3 style="font-size:var(--text-h3);font-weight:var(--weight-semibold);line-height:var(--lh-snug)">Heading Three</h3><span class="meta">26px · Semibold · 130%</span></div>
  <div class="row"><span class="tag">H4</span><h4 style="font-size:var(--text-h4);font-weight:var(--weight-semibold);line-height:var(--lh-snug)">Heading Four</h4><span class="meta">22px · Semibold · 130%</span></div>
  <div class="row"><span class="tag">H5</span><h5 style="font-size:var(--text-h5);font-weight:var(--weight-regular);line-height:var(--lh-normal)">Heading Five</h5><span class="meta">19px · Regular · 140%</span></div>
  <div class="row"><span class="tag">H6</span><h6 style="font-size:var(--text-h6);font-weight:var(--weight-regular);line-height:var(--lh-normal)">Heading Six</h6><span class="meta">17px · Regular · 140%</span></div>
</body></html>
