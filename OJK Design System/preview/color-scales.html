<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-family); background: #fff; padding: 16px 20px; }
  .row { display: flex; gap: 3px; margin-bottom: 10px; }
  .row-label { font-size: 11px; font-weight: 700; color: var(--neutral-600); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .chip { flex: 1; height: 44px; border-radius: 4px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; }
  .chip span { font-size: 9px; font-weight: 600; }
  .light span { color: #fff; }
  .dark span { color: var(--neutral-800); }
</style>
</head><body>
  <div class="row-label">Primary</div>
  <div class="row">
    <div class="chip dark" style="background:var(--primary-50)"><span>50</span></div>
    <div class="chip dark" style="background:var(--primary-100)"><span>100</span></div>
    <div class="chip dark" style="background:var(--primary-200)"><span>200</span></div>
    <div class="chip light" style="background:var(--primary-300)"><span>300</span></div>
    <div class="chip light" style="background:var(--primary-400)"><span>400</span></div>
    <div class="chip light" style="background:var(--primary-500)"><span>500</span></div>
    <div class="chip light" style="background:var(--primary-600)"><span>600</span></div>
    <div class="chip light" style="background:var(--primary-700)"><span>700</span></div>
    <div class="chip light" style="background:var(--primary-800)"><span>800</span></div>
    <div class="chip light" style="background:var(--primary-900)"><span>900</span></div>
  </div>
  <div class="row-label">Secondary</div>
  <div class="row">
    <div class="chip dark" style="background:var(--secondary-50)"><span>50</span></div>
    <div class="chip dark" style="background:var(--secondary-100)"><span>100</span></div>
    <div class="chip dark" style="background:var(--secondary-200)"><span>200</span></div>
    <div class="chip dark" style="background:var(--secondary-300)"><span>300</span></div>
    <div class="chip dark" style="background:var(--secondary-400)"><span>400</span></div>
    <div class="chip light" style="background:var(--secondary-500)"><span>500</span></div>
    <div class="chip light" style="background:var(--secondary-600)"><span>600</span></div>
    <div class="chip light" style="background:var(--secondary-700)"><span>700</span></div>
    <div class="chip light" style="background:var(--secondary-800)"><span>800</span></div>
    <div class="chip light" style="background:var(--secondary-900)"><span>900</span></div>
  </div>
  <div class="row-label">Neutral</div>
  <div class="row">
    <div class="chip dark" style="background:var(--neutral-50)"><span>50</span></div>
    <div class="chip dark" style="background:var(--neutral-100)"><span>100</span></div>
    <div class="chip dark" style="background:var(--neutral-200)"><span>200</span></div>
    <div class="chip dark" style="background:var(--neutral-300)"><span>300</span></div>
    <div class="chip light" style="background:var(--neutral-400)"><span>400</span></div>
    <div class="chip light" style="background:var(--neutral-500)"><span>500</span></div>
    <div class="chip light" style="background:var(--neutral-600)"><span>600</span></div>
    <div class="chip light" style="background:var(--neutral-700)"><span>700</span></div>
    <div class="chip light" style="background:var(--neutral-800)"><span>800</span></div>
    <div class="chip light" style="background:var(--neutral-900)"><span>900</span></div>
  </div>
</body></html>
