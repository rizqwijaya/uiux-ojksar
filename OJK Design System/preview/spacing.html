<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-family); background: #fff; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 12px; align-items: center; }
  .box { width: 56px; height: 56px; background: var(--neutral-100); border-radius: var(--radius-md); flex-shrink: 0; }
  .label { font-size: 11px; color: var(--neutral-500); }
  .val { font-size: 13px; font-weight: 600; color: var(--neutral-800); }
</style>
</head><body>
  <div style="font-size: 11px; font-weight: 700; color: var(--neutral-500); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px;">Spacing Scale</div>
  <div style="display: flex; gap: 4px; align-items: flex-end; height: 80px;">
    <div style="width:28px;background:var(--color-primary);border-radius:3px 3px 0 0;height:4px" title="4px"></div>
    <div style="width:28px;background:var(--color-primary);border-radius:3px 3px 0 0;height:8px" title="8px"></div>
    <div style="width:28px;background:var(--color-primary);border-radius:3px 3px 0 0;height:12px" title="12px"></div>
    <div style="width:28px;background:var(--color-primary);border-radius:3px 3px 0 0;height:16px" title="16px"></div>
    <div style="width:28px;background:var(--color-primary);border-radius:3px 3px 0 0;height:20px" title="20px"></div>
    <div style="width:28px;background:var(--color-primary);border-radius:3px 3px 0 0;height:24px" title="24px"></div>
    <div style="width:28px;background:var(--color-primary);border-radius:3px 3px 0 0;height:32px" title="32px"></div>
    <div style="width:28px;background:var(--color-primary);border-radius:3px 3px 0 0;height:40px" title="40px"></div>
    <div style="width:28px;background:var(--color-primary);border-radius:3px 3px 0 0;height:48px" title="48px"></div>
    <div style="width:28px;background:var(--color-primary);border-radius:3px 3px 0 0;height:64px" title="64px"></div>
    <div style="width:28px;background:var(--color-primary);border-radius:3px 3px 0 0;height:80px" title="80px"></div>
  </div>
  <div style="display: flex; gap: 4px; font-size: 9px; color: var(--neutral-500);">

    <div style="width:28px;text-align:center">80</div>
