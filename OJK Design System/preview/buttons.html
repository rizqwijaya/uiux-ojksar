<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-family); background: #fff; padding: 20px 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 24px; border-radius: var(--radius-md); font-family: var(--font-family); font-size: var(--text-button); font-weight: var(--weight-semibold); letter-spacing: var(--ls-button); border: 2px solid transparent; cursor: pointer; }
  .btn-primary { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
  .btn-secondary { background: var(--color-secondary); color: #fff; border-color: var(--color-secondary); }
  .btn-outline { background: transparent; color: var(--color-primary); border-color: var(--color-primary); }
  .btn-ghost { background: transparent; color: var(--color-primary); border-color: transparent; }
  .btn-sm { padding: 6px 16px; font-size: 13px; }
  .btn-disabled { opacity: 0.45; cursor: not-allowed; }
</style>
</head><body>
  <button class="btn btn-primary">Primary</button>
  <button class="btn btn-secondary">Secondary</button>
  <button class="btn btn-outline">Outline</button>
  <button class="btn btn-ghost">Ghost</button>
  <button class="btn btn-primary btn-sm">Small</button>
  <button class="btn btn-primary btn-disabled">Disabled</button>
</body></html>
